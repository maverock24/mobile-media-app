[build]
  command = "pnpm build"
  publish = "build"
  ignore = "if [ \"$CONTEXT\" = \"production\" ]; then echo 'Skipping Netlify Git production build; GitHub Actions publishes production with Android assets.'; exit 0; fi; exit 1"

[build.processing]
	skip_processing = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), payment=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Access-Control-Allow-Origin = "*"
